<section class="course-list">
  <h1>Available Courses</h1>

  <form
    class="course-search"
    (ngSubmit)="updateSearch()"
  >
    <label for="courseSearch">
      Search courses
    </label>

    <input
      id="courseSearch"
      name="courseSearch"
      type="search"
      placeholder="Enter course name or code"
      [(ngModel)]="searchTerm"
    />

    <button type="submit">
      Search
    </button>
  </form>

  <p class="loading-message" *ngIf="isLoading">
    Loading courses...
  </p>

  <ng-container *ngIf="!isLoading">
    <div
      class="course-grid"
      *ngIf="filteredCourses.length > 0; else noCourses"
    >
      <app-course-card
        *ngFor="
          let course of filteredCourses;
          let i = index;
          trackBy: trackByCourseId
        "
        appHighlight="lightblue"
        [course]="course"
        (click)="openCourseDetails(course.id)"
        (enrollRequested)="onEnroll($event)"
      ></app-course-card>
    </div>

    <ng-template #noCourses>
      <p class="empty-message">
        No matching courses found.
      </p>
    </ng-template>
  </ng-container>

  <p
    class="enrollment-message"
    *ngIf="selectedCourseId !== null"
  >
    Selected course ID: {{ selectedCourseId }}
  </p>
</section>
